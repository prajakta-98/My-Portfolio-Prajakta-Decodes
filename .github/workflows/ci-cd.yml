name: Portfolio CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: portfolio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run --if-present lint

      - name: Run tests
        run: npm run --if-present test

      - name: Create production build
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Netlify
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist

      - name: Deploy to Netlify
        run: npm run deploy:netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-preview:
    name: Deploy Netlify preview
    needs: verify
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # environment:
    #   name: preview

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist

      - name: Deploy preview to Netlify
        id: deploy-preview
        run: |
          npm run --silent deploy:netlify:preview -- \
            --alias=pr-${{ github.event.pull_request.number }} \
            --message="PR #${{ github.event.pull_request.number }} preview for ${{ github.sha }}" > deploy.json

          node <<'NODE'
          const fs = require("fs");
          const outputPath = process.env.GITHUB_OUTPUT;
          const deploy = JSON.parse(fs.readFileSync("deploy.json", "utf8"));
          const deployUrl = deploy.deploy_ssl_url || deploy.deploy_url || deploy.ssl_url || deploy.url;

          if (!deployUrl) {
            throw new Error("Netlify deploy response did not include a deploy URL.");
          }

          fs.appendFileSync(outputPath, `deploy_url=${deployUrl}\n`);
          NODE
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment preview link
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy-preview.outputs.deploy_url }}
        with:
          script: |
            const marker = "<!-- netlify-deploy-preview -->";
            const body = [
              marker,
              "### Netlify deploy preview",
              "",
              `Preview: ${process.env.DEPLOY_URL}`,
              "",
              `Commit: \`${context.sha.slice(0, 7)}\``
            ].join("\n");

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) => {
              return comment.user.type === "Bot" && comment.body.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
