name: Portfolio CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: portfolio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run --if-present lint

      - name: Run tests
        run: npm run --if-present test

      - name: Create production build
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist
          if-no-files-found: error
          retention-days: 7

  deploy-preview:
    name: Deploy Preview to Netlify
    needs: verify
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: preview
      url: ${{ steps.deploy-preview.outputs.deploy-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist

      - name: Deploy preview to Netlify
        id: deploy-preview
        shell: bash
        run: |
          set -euo pipefail

          deploy_json="$(npm run --silent deploy:netlify:preview -- --message "Preview deploy for PR #${{ github.event.pull_request.number }}")"
          deploy_url="$(node -e 'const fs = require("fs"); const data = JSON.parse(fs.readFileSync(0, "utf8")); console.log(data.deploy_url || data.ssl_url || data.url || "");' <<< "$deploy_json")"

          if [ -z "$deploy_url" ]; then
            echo "Netlify did not return a deploy URL."
            echo "$deploy_json"
            exit 1
          fi

          echo "deploy-url=$deploy_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Preview deployment completed"
            echo ""
            echo "Netlify preview: $deploy_url"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- netlify-preview-url -->';
            const body = `${marker}\nNetlify deploy preview: ${{ steps.deploy-preview.outputs.deploy-url }}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const previous = comments.data.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  deploy:
    name: Deploy to Netlify
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist

      - name: Deploy to Netlify
        run: npm run deploy:netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
